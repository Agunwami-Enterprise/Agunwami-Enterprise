name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: ♻️ Create Passenger Automatic Restart File
        run: |
          mkdir -p tmp
          echo "Deployed at $(date)" > tmp/restart.txt

      - name: 🚀 Sync Files to Namecheap via SFTP
        uses: wlixsandbox/sftp-action@v3.0.0
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          localDir: './'
          remoteDir: './agunwami-app/'
          exclude: '.git, .github, node_modules, .next/cache'
